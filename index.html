<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Investor dashboard for EV charging stations" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Starvo Dashboard" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#000000" />
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- MUI Color Scheme Script - Prevents FOUC (Flash of Unstyled Content) -->
    <script>
      (function() {
        var mode;
        try {
          mode = localStorage.getItem('materialize-mui-template-mode');
        } catch (e) {}
        if (!mode && window.matchMedia) {
          var mq = window.matchMedia('(prefers-color-scheme: dark)');
          mode = mq.matches ? 'dark' : 'light';
        }
        if (mode) {
          document.documentElement.setAttribute('data-mui-color-scheme', mode);
        }
      })();
    </script>
    
    <title>Starvo EV Charging Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
